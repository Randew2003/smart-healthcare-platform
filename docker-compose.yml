version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: healthcare-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  auth-admin-service:
    build: ./services/auth-admin-service
    env_file: ./services/auth-admin-service/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/auth_admin_service
    ports:
      - "4001:4001"
    depends_on:
      - mongo
volumes:
  mongo_data: